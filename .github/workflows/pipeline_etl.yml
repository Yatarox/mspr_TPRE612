name: ETL Pipeline (Airflow)

on:
  push:
    branches: [main, ETL]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  AIRFLOW_VERSION: '2.8.0'
  IMAGE_NAME: mspr-airflow

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd etl
          pip install flake8 pylint black isort
          pip install -r requirements.txt
      
      - name: Run Black (formatter check)
        run: |
          cd etl
          black --check dags/ plugins/ || true
      
      - name: Run isort (import sorting)
        run: |
          cd etl
          isort --check-only dags/ plugins/ || true
      
      - name: Run Flake8
        run: |
          cd etl
          flake8 dags/ plugins/ --count --max-line-length=120 --statistics || true
      
      - name: Run Pylint
        run: |
          cd etl
          pylint dags/ plugins/ --max-line-length=120 || true
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/python p/security-audit p/owasp-top-ten
        env:
          SEMGREP_RULES: etl/

  validate-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Airflow
        run: |
          cd etl
          pip install apache-airflow==${{ env.AIRFLOW_VERSION }}
          pip install -r requirements.txt
      
      - name: Initialize Airflow DB
        run: |
          cd etl
          export AIRFLOW_HOME=$(pwd)
          airflow db init
      
      - name: Validate DAG integrity
        run: |
          cd etl
          export AIRFLOW_HOME=$(pwd)
          # Vérifier que tous les DAGs se chargent sans erreur
          python -c "from airflow.models import DagBag; dag_bag = DagBag(dag_folder='dags/', include_examples=False); assert len(dag_bag.import_errors) == 0, f'DAG import errors: {dag_bag.import_errors}'"
      
      - name: Test DAG structure
        run: |
          cd etl
          export AIRFLOW_HOME=$(pwd)
          # Vérifier la structure des DAGs
          python -c "
          from airflow.models import DagBag
          dag_bag = DagBag(dag_folder='dags/', include_examples=False)
          for dag_id, dag in dag_bag.dags.items():
              print(f'DAG: {dag_id}')
              print(f'  Tasks: {len(dag.tasks)}')
              print(f'  Schedule: {dag.schedule_interval}')
          "

  test-dags:
    name: Test DAGs
    runs-on: ubuntu-latest
    needs: [validate-dags]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd etl
          pip install apache-airflow==${{ env.AIRFLOW_VERSION }}
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run unit tests
        run: |
          cd etl
          export AIRFLOW_HOME=$(pwd)
          airflow db init
          pytest tests/ -v --cov=dags --cov=plugins --cov-report=xml --cov-report=html || true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./etl/coverage.xml
          flags: etl

  build-docker:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [test-dags]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./etl
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Safety
        run: pip install safety
      
      - name: Check dependencies
        run: |
          cd etl
          pip install -r requirements.txt
          safety check --json || true

  