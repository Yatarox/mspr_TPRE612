name: CI - API Build & Quality

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install ruff
        run: pip install ruff

      - name: 🧹 Lint code with ruff
        run: ruff check ./api/src


  audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install pip-audit
        run: pip install pip-audit

      - name: 🔒 Check dependencies for vulnerabilities
        run: pip-audit -r ./api/requirements.txt


  test:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install -r ./api/requirements.txt
          pip install pytest pytest-cov

      - name: 🧪 Run unit tests with coverage
        run: |
          pytest --cov=api/src --cov-config=.coveragerc --cov-report=xml:api/coverage.xml api/tests

      - name: 📤 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-api
          path: api/coverage.xml


  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [audit, test]
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐳 Build Docker image
        run: docker build -t mspr-api ./api