name: Database Pipeline

on:
  push:
    branches: [main, database]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MYSQL_VERSION: '8.0'

jobs:
  code-quality:
    name: SQL Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Semgrep on SQL files
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/sql-injection p/security-audit
        env:
          SEMGREP_RULES: database/
      
      - name: SQL Lint
        run: |
          npm install -g sql-lint
          find database -name "*.sql" -exec echo "Checking {}" \;

  build-and-test:
    name: Build & Test Database
    runs-on: ubuntu-latest
    needs: [code-quality]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v3

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -P3306 --silent; do
            echo 'waiting for mysql...'
            sleep 2
          done

      - name: Run database migrations
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        run: |
          # Exécuter les scripts SQL de création de schéma
          mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE < database/schema.sql
          
          # Exécuter les scripts d'initialisation si présents
          if [ -d "database/init" ]; then
            for file in database/init/*.sql; do
              echo "Executing $file..."
              mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE < $file
            done
          fi

      - name: Validate database structure
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        run: |
          # Vérifier que les tables ont été créées
          mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD -e "SHOW TABLES;" $MYSQL_DATABASE
          
          # Vérifier la structure des tables
          mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD -e "SHOW CREATE TABLE your_table_name;" $MYSQL_DATABASE || true

      - name: Run database tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        run: |
          # Exécuter les scripts de test SQL si présents
          if [ -d "database/tests" ]; then
            for file in database/tests/*.sql; do
              echo "Running test: $file"
              mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE < $file
            done
          fi

  build-docker:
    name: Build Database Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./database
          push: false
          tags: mspr-database:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mspr-database:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  