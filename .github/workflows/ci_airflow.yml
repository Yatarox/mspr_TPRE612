name: CI - Airflow Build & Quality

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main]

jobs:
  build-and-test-airflow:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install -r ./etl/requirements.txt
          pip install pandas

      - name: 🧹 Lint code with ruff
        run: |
          pip install ruff
          ruff check ./etl/scripts

      - name: 🧪 Run unit tests with coverage
        run: |
          pip install pytest pytest-cov
          export PYTHONPATH=$PYTHONPATH:./etl/scripts
          pytest --cov=etl/scripts --cov-report=xml:etl/coverage.xml etl/scripts/

      - name: 📤 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-airflow
          path: etl/coverage.xml

      - name: 🐳 Build Airflow Docker image
        run: docker build -t mspr-airflow ./etl
